services:
  - type: web
    name: agentic-sql-agent
    runtime: python
    buildCommand: "pip install -r requirements.txt && python data/seed.py"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
